# Stripping notebook outputs is handled by Git filters (nbstripout) + .gitattributes.
# This file validates .ipynb structure before commit/push.
repos:
  - repo: local
    hooks:
      - id: validate-notebooks
        name: validate jupyter notebooks
        entry: python scripts/validate_notebooks.py
        language: python
        additional_dependencies: [nbformat>=5.9.0]
        files: \.ipynb$
        stages: [pre-commit, pre-push]
